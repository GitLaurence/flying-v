name: Fetch Flying V Stations

on:
  # Run every Monday at 02:00 UTC
  schedule:
    - cron: '0 2 * * 1'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch stations (OSM + Google Places if key is set)
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Google Places API key found — fetching from both OSM and Google."
            python3 scripts/fetch_stations.py --update-locations --google-key "$GOOGLE_MAPS_API_KEY"
          else
            echo "No GOOGLE_MAPS_API_KEY secret set — fetching from OSM only."
            echo "To enable Google Places, add GOOGLE_MAPS_API_KEY to repository secrets."
            python3 scripts/fetch_stations.py --update-locations
          fi

      - name: Commit and push if locations.html changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add locations.html scripts/flying_v_stations.csv
          if git diff --staged --quiet; then
            echo "No changes — station list is already up to date."
          else
            STATION_COUNT=$(grep -c 'class="station-card"' locations.html || true)
            git commit -m "chore: update Flying V station list (${STATION_COUNT} stations)"
            git push
          fi
