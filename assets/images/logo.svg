<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 58" width="130" height="58" role="img" aria-label="Flying V logo">
  <title>Flying V</title>
  <!-- Orange wing / V shape -->
  <polygon points="8,4 44,4 65,28 86,4 122,4 65,44" fill="#F5A100"/>
  <!-- Inner highlight lines to create the striped wing effect -->
  <polygon points="20,4 36,4 65,35 94,4 110,4 65,40" fill="#E08C00" opacity="0.3"/>
  <line x1="65" y1="28" x2="44" y2="4"  stroke="#D47A00" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="28" x2="86" y2="4"  stroke="#D47A00" stroke-width="1" opacity="0.4"/>
  <!-- FLYING V text -->
  <text
    x="65"
    y="54"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="12.5"
    font-weight="900"
    letter-spacing="1.5"
    fill="#1A2D5A">FLYING V</text>
</svg>
